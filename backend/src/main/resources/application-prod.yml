spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/meetsync
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:meetsync}
    password: ${DB_PASSWORD:meetsync}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

file:
  upload-dir: ${FILE_UPLOAD_DIR:/var/meetsync/uploads}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
