server:
  port: 8081
  address: 0.0.0.0
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: meetsync

spring:
  datasource:
    url: jdbc:h2:mem:meetsync
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# JWT 설정
jwt:
  secret: bWVldHN5bmMtand0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHktcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u
  expiration: 86400000  # 24시간 (밀리초)

# 파일 업로드 경로
file:
  upload-dir: ./uploads

# CORS 설정
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://172.30.1.92:3000,http://172.30.1.92:3001,https://172.30.1.92:3000,https://172.30.1.92:3001,https://172.30.1.92:3443,https://localhost:3443,https://localhost:3000,https://localhost:3001

# AI API 설정
ai:
