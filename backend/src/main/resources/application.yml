server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:meetsync
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# JWT 설정
jwt:
  secret: bWVldHN5bmMtand0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHktcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u
  expiration: 86400000  # 24시간 (밀리초)

# 파일 업로드 경로
file:
  upload-dir: ./uploads

# CORS 설정
cors:
  allowed-origins: http://localhost:3000

# Swagger 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
